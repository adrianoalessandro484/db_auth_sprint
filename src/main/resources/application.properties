spring.application.name=db_auth
server.port=8081

# Conexión directa a PostgreSQL 16 (sin .env)
spring.datasource.url=jdbc:postgresql://localhost:5433/db_auth
spring.datasource.username=adriano
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Eureka (cliente)
eureka.client.enabled=true
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Logs
logging.level.org.springframework.security=INFO
logging.level.com.auth.db_auth=DEBUG