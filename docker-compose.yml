services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-db-auth-postgres
    environment:
      POSTGRES_USER: adriano
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: db_auth
    ports:
      - "5433:5432"
    volumes:
      - db_auth_data:/var/lib/postgresql/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adriano -d db_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-ms-auth
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    env_file:
      - .env
    networks:
      - erp-network
    restart: unless-stopped

volumes:
  db_auth_data:

networks:
  erp-network:
    driver: bridge