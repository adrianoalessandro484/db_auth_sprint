services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-db-auth-postgres
    environment:
      POSTGRES_USER: adriano
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: db_auth
    ports:
      - "5433:5432"
    volumes:
      - db_auth_data:/var/lib/postgresql/data
    networks:
      - erp-db-auth-network
    restart: unless-stopped
    command: ["postgres", "-c", "timezone=America/Lima"]

  app:
    image: eclipse-temurin:17-jre
    container_name: erp-ms-auth
    depends_on:
      - postgres
    ports:
      - "8081:8081"
    volumes:
      - ./target:/app
    working_dir: /app
    command: ["java", "-jar", "db_auth-0.0.1-SNAPSHOT.jar"]
    networks:
      - erp-db-auth-network
    restart: unless-stopped

volumes:
  db_auth_data:

networks:
  erp-db-auth-network:
    driver: bridge